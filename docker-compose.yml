version: '3.8'

services:
  bot:
    build: .
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin_pwd}@postgres:5432/${POSTGRES_DB:-zinsbot}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - NODE_ENV=production
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-secret}
      - OPENCODE_URL=http://opencode:4096
    depends_on:
      - postgres
      - opencode
    restart: unless-stopped
    ports:
      - "3000:3000"

  opencode:
    build: .
    command: [ "opencode", "serve", "--hostname=0.0.0.0", "--port=4096" ]
    environment:
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-secret}
    volumes:
      - opencode_data:/root/.opencode
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-zinsbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  opencode_data:
