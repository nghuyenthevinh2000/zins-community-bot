version: '3.8'

services:
  bot:
    build: .
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin_pwd}@postgres:5432/${POSTGRES_DB:-zinsbot}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - NODE_ENV=production
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-zinsbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
